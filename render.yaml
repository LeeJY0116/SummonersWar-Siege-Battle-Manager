services:
  - type: web
    name: sw-siege-backend-sg
    runtime: docker
    rootDir: Siege-Battle-Manager/backend/siege-backend
    plan: starter
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DDL_AUTO
        value: validate
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_LOGIN_PER_MINUTE
        value: 5
      - key: RATE_LIMIT_SIGNUP_PER_MINUTE
        value: 3
      - key: RATE_LIMIT_GUILD_REQUEST_PER_MINUTE
        value: 5
      - key: RATE_LIMIT_ADMIN_PER_MINUTE
        value: 60
      - key: DB_MIN_IDLE
        value: 1
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_ALLOWED_IPS
        sync: false
