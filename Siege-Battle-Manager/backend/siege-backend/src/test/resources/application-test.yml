spring:
  datasource:
    url: jdbc:h2:mem:siege-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    defer-datasource-initialization: true

  h2:
    console:
      enabled: false

external:
  swarfarm:
    base-url: https://swarfarm.com/api/v2
    image-base-url: https://swarfarm.com/static/herders/images/monsters

logging:
  level:
    org.springframework.security: WARN
