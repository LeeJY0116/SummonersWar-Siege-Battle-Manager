spring:
  profiles:
    default: dev

  jpa:
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

server:
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

external:
  swarfarm:
    base-url: ${SWARFARM_BASE_URL:https://swarfarm.com/api/v2}
    image-base-url: ${SWARFARM_IMAGE_BASE_URL:https://swarfarm.com/static/herders/images/monsters}
    page-size: ${SWARFARM_PAGE_SIZE:200}
    connect-timeout-seconds: ${SWARFARM_CONNECT_TIMEOUT_SECONDS:10}
    read-timeout-seconds: ${SWARFARM_READ_TIMEOUT_SECONDS:30}
    append-missing-localization: ${SWARFARM_APPEND_MISSING_LOCALIZATION:false}

security:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-32-byte-or-longer-secret}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
  admin:
    allowed-ips: ${ADMIN_ALLOWED_IPS:}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    login-per-minute: ${RATE_LIMIT_LOGIN_PER_MINUTE:10}
    signup-per-minute: ${RATE_LIMIT_SIGNUP_PER_MINUTE:5}
    guild-request-per-minute: ${RATE_LIMIT_GUILD_REQUEST_PER_MINUTE:10}
    admin-per-minute: ${RATE_LIMIT_ADMIN_PER_MINUTE:120}

app:
  admin:
    initial-id: ${ADMIN_INITIAL_ID:}
    initial-password: ${ADMIN_INITIAL_PASSWORD:}
    initial-email: ${ADMIN_INITIAL_EMAIL:admin@example.local}
    initial-nickname: ${ADMIN_INITIAL_NICKNAME:admin}

logging:
  level:
    org.springframework.security: ${SPRING_SECURITY_LOG_LEVEL:INFO}
